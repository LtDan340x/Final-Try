<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H-Town Hitters Race App - Admin</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- 🔥 REQUIRED: LOAD SUPABASE CONFIG FIRST -->
  <script src="supabase-config.js"></script>
</head>

<body>
  <div class="app-shell">

    <!-- SIDE PANEL -->
    <aside class="side-panel glass">
      <div class="brand-block">
        <div class="brand-kicker">B STYLE</div>
        <h1>H-Town Hitters</h1>
        <p>Race Control</p>
      </div>

      <nav class="nav-stack">
        <a class="nav-link active" href="admin.html">Admin</a>
        <a class="nav-link" href="racer.html">Racer View</a>
        <a class="nav-link" href="board.html">MultiView Board</a>
        <a class="nav-link" href="index.html">Home</a>
      </nav>

      <div class="sync-box">
        <h4>SYNC MODE</h4>
        <p id="syncStatus">Checking...</p>
      </div>

      <div class="share-box">
        <h4>SHARE LINK</h4>
        <p>https://htxhitters.netlify.app/admin</p>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-panel">

      <h2>Round Manager</h2>

      <!-- EVENT SETUP -->
      <div class="card">
        <h3>Event Setup</h3>

        <label>Event Name</label>
        <input id="eventName" value="H-Town Hitters Race App" />

        <label>Current Round</label>
        <input id="roundNumber" type="number" value="1" />

        <button onclick="saveSettings()">Save Event Settings</button>
        <button onclick="pushCallToLanes()">Push Call To Lanes</button>

        <label>Call-to-Lanes Message</label>
        <input id="callMessage" value="Round 1 pairings are live" />
      </div>

      <!-- ADD RACER -->
      <div class="card">
        <h3>Add Racer</h3>

        <input id="racerName" placeholder="Racer Name" />
        <input id="carNumber" placeholder="Car #" />

        <button onclick="addRacer()">Add Racer</button>
      </div>

      <!-- RACERS LIST -->
      <div class="card">
        <h3>Racers</h3>
        <div id="racerList"></div>
      </div>

      <!-- ROUND ACTIONS -->
      <div class="card">
        <h3>Round Actions</h3>

        <button onclick="generatePairings()">Generate Pairings</button>
        <button onclick="clearRound()">Clear Round</button>
      </div>

    </main>
  </div>

  <!-- 🔥 MAIN APP LOGIC -->
  <script src="admin.js"></script>

  <!-- 🔥 SYNC MODE DETECTION -->
  <script>
    if (window.SUPABASE_CONFIG && window.SUPABASE_CONFIG.url) {
      document.getElementById("syncStatus").innerText = "Online Mode ✅";
    } else {
      document.getElementById("syncStatus").innerText = "Local Browser Mode ❌";
    }
  </script>

</body>
</html>
